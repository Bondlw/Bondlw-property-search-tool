<style>
  /* Caseware Brand Tokens */
  :root {
    --bg: #191a1c;
    --card: #1e2028;
    --border: #2a2d38;
    --text: #f1f5f9;
    --muted: #a8b5c9;
    --accent: #1c4dff;
    --green: #22c55e;
    --amber: #f59e0b;
    --red: #ef4444;
    --score-bg: #2a2d38;
    --nav-bg: #191a1c;
    --fav: #f0645e;
    /* Design Tokens */
    --radius-sm: 4px;
    --radius-md: 6px;
    --radius-lg: 8px;
    --radius-pill: 12px;
    --space-xs: 2px;
    --space-sm: 4px;
    --space-md: 8px;
    --space-lg: 12px;
    --space-xl: 16px;
    --space-2xl: 24px;
    --text-xs: 0.75rem;   /* 12px min */
    --text-sm: 0.8125rem;  /* 13px */
    --text-base: 0.875rem; /* 14px */
    --text-lg: 1.125rem;   /* 18px */
    --text-xl: 1.5rem;     /* 24px */
    --glass-dark: rgba(0, 0, 0, 0.6);
    --bg-success: #1a3a2a;
    --bg-warning: #3a2a1a;
    --bg-error: #2a1a1a;
    --bg-info: #1a2a3a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'League Spartan', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    padding: 16px;
    max-width: 1920px;
    margin: 0 auto;
  }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  :focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  /* --- Financial profile bar --- */
  .profile-bar {
    display: flex; flex-wrap: wrap; gap: 6px 16px;
    background: var(--card); border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 14px; margin-bottom: 12px; font-size: var(--text-sm); color: var(--muted);
  }
  .profile-bar span { white-space: nowrap; }
  .profile-bar .val { color: var(--text); font-weight: 600; }

  /* --- Summary stats --- */
  .summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 8px; margin-bottom: 12px; }
  .stat { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 10px; text-align: center; }
  .stat .value { font-size: 1.6rem; font-weight: 700; }
  .stat .label { font-size: var(--text-xs); color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .stat.green .value { color: var(--green); }
  .stat.amber .value { color: var(--amber); }

  /* --- Sticky nav --- */
  .nav {
    position: sticky; top: 0; z-index: 100;
    background: var(--nav-bg); border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 12px; margin-bottom: 16px; display: flex; flex-wrap: wrap; gap: 6px;
  }
  .nav a {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 4px 10px; border-radius: 4px; font-size: var(--text-xs); font-weight: 500;
    color: var(--muted); transition: background 0.15s;
  }
  .nav a:hover { background: var(--score-bg); color: var(--text); text-decoration: none; }
  .nav .badge-count { background: var(--score-bg); padding: 1px 6px; border-radius: 10px; font-size: var(--text-xs); font-weight: 600; }
  .nav a.active { color: var(--accent); background: var(--score-bg); }

  /* --- Collapsible sections --- */
  details { margin-bottom: 16px; }
  details > summary {
    cursor: pointer; font-size: var(--text-lg); font-weight: 600; padding: 8px 0;
    border-bottom: 1px solid var(--border); list-style: none;
    display: flex; align-items: center; gap: 8px;
  }
  details > summary::-webkit-details-marker { display: none; }
  details > summary::before { content: "\25B8"; transition: transform 0.15s; display: inline-block; }
  details[open] > summary::before { transform: rotate(90deg); }
  details > summary .count { font-size: var(--text-sm); color: var(--muted); font-weight: 400; }

  /* --- Cards grid --- */
  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 10px; padding-top: 10px; }
  .property-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 8px;
    padding: 12px; font-size: var(--text-sm); position: relative;
  }
  .property-card.qualifying { border-left: 3px solid var(--green); }
  .property-card.near-miss { border-left: 3px solid var(--amber); }
  .property-card.needs-verify { border-left: 3px solid #6366f1; }
  .property-card.stretch { border-left: 3px solid var(--accent); }
  .property-card.negotiation { border-left: 3px solid var(--accent); }
  .property-card.favourite { border-left: 3px solid var(--fav); }
  .property-card.excluded { opacity: 0.4; }

  /* --- Image carousel --- */
  .carousel {
    position: relative; width: 100%; height: 140px; border-radius: 6px;
    overflow: hidden; margin-bottom: 6px; background: var(--score-bg);
  }
  .carousel-track {
    display: flex; height: 100%; overflow-x: auto; scroll-snap-type: x mandatory;
    scrollbar-width: none; -ms-overflow-style: none;
  }
  .carousel-track::-webkit-scrollbar { display: none; }
  .carousel-track img {
    flex: 0 0 100%; width: 100%; height: 100%; object-fit: cover;
    scroll-snap-align: start;
  }
  .carousel-btn {
    position: absolute; top: 50%; transform: translateY(-50%);
    background: rgba(0,0,0,0.6); color: #fff; border: none; cursor: pointer;
    width: 36px; height: 36px; border-radius: 50%; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    opacity: 0.6; transition: opacity 0.2s;
  }
  .carousel:hover .carousel-btn { opacity: 1; }
  .carousel-btn.prev { left: 6px; }
  .carousel-btn.next { right: 6px; }
  .carousel-counter {
    position: absolute; bottom: 4px; right: 6px;
    background: rgba(0,0,0,0.6); color: #fff; padding: 1px 6px;
    border-radius: 3px; font-size: var(--text-xs);
  }
  .no-images { height: 60px; display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: var(--text-xs); }

  /* Card header */
  .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
  .card-header .price { font-size: var(--text-lg); font-weight: 700; }
  .card-header .score { background: var(--score-bg); padding: 2px 8px; border-radius: 5px; font-weight: 700; font-size: var(--text-sm); }
  .score.high { color: var(--green); }
  .score.medium { color: var(--amber); }
  .score.low { color: var(--red); }

  .card-address { font-size: var(--text-xs); color: var(--muted); margin-bottom: 3px; }
  .card-address a { color: var(--muted); }
  .card-address a:hover { color: var(--accent); }

  /* Action buttons */
  .card-actions {
    display: flex; gap: 4px; margin-left: auto; padding-left: 8px; flex-shrink: 0;
  }
  .action-btn {
    background: var(--score-bg); border: 1px solid var(--border);
    color: var(--muted); cursor: pointer; width: 36px; height: 36px;
    border-radius: 4px; font-size: 15px; display: flex;
    align-items: center; justify-content: center; transition: all 0.15s;
  }
  .action-btn:hover { background: var(--score-bg); color: var(--text); }
  .action-btn.fav-active { color: var(--fav); background: rgba(245,158,11,0.15); border-color: var(--fav); }
  .action-btn.shortlist-active { color: var(--green); background: rgba(34,197,94,0.15); border-color: var(--green); }
  .action-btn.excl-active { color: var(--red); background: rgba(248,113,113,0.15); border-color: var(--red); }

  /* Status badge on card */
  .badge.status-shortlisted { background: rgba(34,197,94,0.15); color: var(--green); border: 1px solid var(--green); }

  /* Tags row */
  .card-meta { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 4px; font-size: var(--text-xs); }
  .tag { background: var(--score-bg); padding: 1px 6px; border-radius: 3px; color: var(--muted); white-space: nowrap; }
  .tag.tenure { color: var(--accent); } .tag.warn { color: var(--amber); }
  .tag.bad { color: var(--red); } .tag.good { color: var(--green); }

  /* Monthly cost bar */
  .cost-bar {
    background: var(--score-bg); border-radius: 5px;
    margin-bottom: 4px; font-size: var(--text-xs);
  }

  /* % of wage badges on card face */
  .wage-badges {
    display: flex; gap: 6px; flex-wrap: wrap; align-items: center;
    margin-bottom: 4px; font-size: var(--text-xs);
  }
  .wage-badge {
    display: inline-flex; align-items: center; gap: 3px;
    padding: 2px 7px; border-radius: var(--radius-pill);
    font-weight: 600; font-size: var(--text-xs);
  }
  .wage-badge.green { background: rgba(34,197,94,0.12); color: var(--green); }
  .wage-badge.amber { background: rgba(245,158,11,0.12); color: var(--amber); }
  .wage-badge.red   { background: rgba(239,68,68,0.12); color: var(--red); }
  .wage-remaining { color: var(--muted); font-size: var(--text-xs); }
  .wage-remaining.good { color: var(--green); }
  .wage-remaining.tight { color: var(--amber); }
  .wage-remaining.negative { color: var(--red); }
  .affordability-warning {
    background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2);
    border-radius: var(--radius-sm); padding: 3px 8px; margin-bottom: 4px;
    font-size: var(--text-xs); color: var(--red); font-weight: 500;
  }
  .cost-bar > summary {
    display: flex; align-items: center; gap: 8px;
    padding: 4px 8px; cursor: pointer; list-style: none;
  }
  .cost-bar > summary::-webkit-details-marker { display: none; }
  .cost-bar > summary::before { content: none; }
  .cost-bar .total { font-weight: 700; font-size: var(--text-base); }
  .cost-bar .pct { font-size: var(--text-xs); }
  .cost-bar .expand-hint { font-size: var(--text-xs); color: var(--muted); margin-left: auto; }
  .cost-bar.green .total, .cost-bar.green .pct { color: var(--green); }
  .cost-bar.amber .total, .cost-bar.amber .pct { color: var(--amber); }
  .cost-bar.red .total, .cost-bar.red .pct { color: var(--red); }
  .cost-breakdown-full {
    padding: 4px 8px 6px; font-size: var(--text-xs); color: var(--muted);
    border-top: 1px solid var(--border);
  }
  .cost-breakdown-full .cost-row { display: flex; justify-content: space-between; padding: 1px 0; }
  .cost-breakdown-full .cost-total { color: var(--text); font-weight: 600; border-top: 1px solid var(--border); margin-top: 3px; padding-top: 3px; }
  .cost-breakdown-full .cost-row-bills { color: var(--muted); }
  .cost-breakdown-full .cost-row-bills-first { color: var(--muted); margin-top: 2px; }

  /* Score breakdown — click-to-expand panel with bar visualization */
  .score-breakdown { display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px; font-size: var(--text-xs); margin-top: 6px; }
  .score-item {
    background: var(--score-bg); border-radius: 3px; padding: 4px 6px;
    display: flex; flex-direction: column; gap: 2px; cursor: pointer;
  }
  .score-item-header { display: flex; justify-content: space-between; align-items: center; }
  .score-item .score-label { color: var(--muted); }
  .score-item .score-val { font-weight: 600; color: var(--text); }
  .score-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .score-bar-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
  .score-bar-fill.high { background: var(--green); }
  .score-bar-fill.medium { background: var(--amber); }
  .score-bar-fill.low { background: var(--red); }
  .score-reason { display: none; font-size: var(--text-xs); color: var(--muted); line-height: 1.4; margin-top: 2px; word-break: break-word; }
  .score-item.expanded .score-reason { display: block; }
  .score-item.expanded { grid-column: 1 / -1; }

  /* Pills */
  .pill.pill-stretch { color: var(--accent); }

  /* Crime + DOM pills */
  .pills { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 4px; }
  .pill { font-size: var(--text-xs); padding: 1px 5px; border-radius: 3px; background: var(--score-bg); color: var(--muted); white-space: nowrap; }
  .pill.crime-green { color: var(--green); } .pill.crime-amber { color: var(--amber); } .pill.crime-red { color: var(--red); }
  .pill.dom-grey { color: var(--muted); } .pill.dom-amber { color: var(--amber); } .pill.dom-red { color: var(--red); }
  .pill.walk-green { color: var(--green); } .pill.walk-amber { color: var(--amber); } .pill.walk-red { color: var(--red); }
  .pill.flood-green { color: var(--green); } .pill.flood-amber { color: var(--amber); } .pill.flood-red { color: var(--red); }
  .pill.broadband-good { color: var(--green); } .pill.broadband-ok { color: var(--amber); } .pill.broadband-poor { color: var(--red); }
  .pill a { color: inherit; text-decoration: none; }
  .pill a:hover { text-decoration: underline; }
  .property-description { font-size: var(--text-xs); color: var(--muted); line-height: 1.5; margin-top: 4px; }
  .property-description summary { cursor: pointer; font-weight: 600; color: var(--text); font-size: var(--text-sm); }
  .property-description .desc-text { margin-top: 4px; max-height: 120px; overflow-y: auto; white-space: pre-line; }
  .card-tracking { display: flex; gap: 8px; align-items: center; margin: 6px 0; flex-wrap: wrap; }
  .card-tracking select { font-size: var(--text-xs); padding: 3px 6px; border-radius: 4px; border: 1px solid var(--border); background: var(--score-bg); color: var(--text); }
  .card-tracking .tracking-label { font-size: var(--text-xs); font-weight: 600; color: var(--muted); }
  .card-notes textarea { width: 100%; min-height: 48px; max-height: 120px; resize: vertical; font-size: var(--text-xs); padding: 6px; border: 1px solid var(--border); border-radius: 4px; background: var(--score-bg); color: var(--text); font-family: inherit; }
  .card-notes textarea:focus { outline: 2px solid var(--accent); border-color: var(--accent); }
  .card-notes { margin: 6px 0; }
  .card-notes .note-saved { font-size: var(--text-xs); color: var(--green); opacity: 0; transition: opacity 0.3s; }
  .card-footer .enquiry-btn { background: none; border: 1px solid var(--accent); color: var(--accent); padding: 3px 10px; border-radius: 4px; cursor: pointer; font-size: var(--text-xs); font-weight: 600; }
  .card-footer .enquiry-btn:hover { background: var(--accent); color: #fff; }
  .card-notes .note-saved.show { opacity: 1; }
  /* Table view */
  .table-view { display: none; overflow-x: auto; margin: 12px 0; }
  .table-view.active { display: block; }
  .table-view table { width: 100%; border-collapse: collapse; font-size: var(--text-xs); }
  .table-view th { background: var(--score-bg); text-align: left; padding: 6px 8px; border-bottom: 2px solid var(--border); font-weight: 700; cursor: pointer; white-space: nowrap; position: sticky; top: 0; }
  .table-view th:hover { background: var(--border); }
  .table-view td { padding: 5px 8px; border-bottom: 1px solid var(--border); white-space: nowrap; }
  .table-view tr:hover { background: var(--score-bg); }
  .table-view .score-cell { font-weight: 600; }
  .table-view .score-cell.high { color: var(--green); } .table-view .score-cell.medium { color: var(--amber); } .table-view .score-cell.low { color: var(--red); }
  .table-view a { color: var(--accent); }
  .table-view .expand-chevron { cursor: pointer; user-select: none; transition: transform 0.2s; display: inline-block; color: var(--muted); font-size: 0.7rem; }
  .table-view tr.expanded .expand-chevron { transform: rotate(90deg); }
  .table-view tr.tbl-detail-row > td { padding: 0; border-bottom: 2px solid var(--accent); }
  .table-view tr.tbl-detail-row:hover { background: none; }
  .tbl-detail-panel { display: flex; gap: 16px; padding: 12px 16px; background: var(--score-bg); max-width: 100%; overflow: hidden; }
  .tbl-detail-panel .tbl-detail-images { flex: 0 0 320px; max-width: 320px; }
  .tbl-detail-panel .tbl-detail-images img { width: 100%; border-radius: 6px; display: block; margin-bottom: 6px; max-height: 220px; object-fit: cover; }
  .tbl-detail-panel .tbl-detail-images .tbl-thumb-strip { display: flex; gap: 4px; overflow-x: auto; margin-top: 4px; }
  .tbl-detail-panel .tbl-detail-images .tbl-thumb-strip img { width: 56px; height: 42px; object-fit: cover; border-radius: 3px; cursor: pointer; opacity: 0.7; flex-shrink: 0; }
  .tbl-detail-panel .tbl-detail-images .tbl-thumb-strip img:hover, .tbl-detail-panel .tbl-detail-images .tbl-thumb-strip img.active { opacity: 1; outline: 2px solid var(--accent); }
  .tbl-detail-panel .tbl-detail-info { flex: 1; min-width: 0; font-size: var(--text-xs); line-height: 1.5; }
  .tbl-detail-panel .tbl-detail-info .tbl-detail-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  .tbl-detail-panel .tbl-detail-info .tbl-detail-meta .tag { font-size: 0.65rem; }
  .tbl-detail-panel .tbl-detail-info .tbl-detail-desc { color: var(--muted); max-height: 100px; overflow-y: auto; margin-bottom: 8px; white-space: pre-wrap; word-break: break-word; }
  .tbl-detail-panel .tbl-detail-info .tbl-detail-links { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .tbl-detail-panel .tbl-detail-info .tbl-detail-links a, .tbl-detail-panel .tbl-detail-info .tbl-detail-links button { font-size: 0.7rem; }
  .tbl-detail-panel .tbl-detail-costs { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 4px 12px; margin-bottom: 8px; }
  .tbl-detail-panel .tbl-cost-item { display: flex; justify-content: space-between; }
  .tbl-detail-panel .tbl-cost-label { color: var(--muted); }
  .tbl-detail-panel .tbl-cost-value { font-weight: 600; }
  .tbl-detail-panel .tbl-detail-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
  body.view-table .cards { display: none; }
  body.view-table .table-view { display: block; }

  /* Map view */
  #map-container { display: none; height: 70vh; margin: 12px 0; border-radius: 8px; border: 1px solid var(--border); z-index: 1; }
  body.view-map #map-container { display: block; }
  body.view-map .cards { display: none; }
  body.view-map .table-view { display: none; }
  .map-popup { font-size: var(--text-xs); line-height: 1.4; max-width: 220px; }
  .map-popup strong { display: block; margin-bottom: 4px; }
  .map-popup .map-score { font-weight: 600; }
  .map-popup a { color: var(--accent); }

  /* Gate failures */
  .gate-failures { margin-top: 4px; font-size: var(--text-xs); }
  .gate-fail { color: var(--red); margin-bottom: 1px; }
  .gate-failures-banner { background: rgba(255,80,80,0.08); border: 1px solid rgba(255,80,80,0.25); border-radius: 6px; padding: 6px 10px; margin: 6px 0; }
  .gate-fail-top { color: var(--red); font-size: var(--text-xs); margin-bottom: 2px; }

  /* Today's Actions */
  .todays-actions { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; margin-bottom: 12px; }
  .action-item { display: block; font-size: var(--text-sm); padding: 4px 0; cursor: pointer; }
  .action-item.done { text-decoration: line-through; opacity: 0.5; }
  .gate-pills { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 4px; }
  .gate-pill { font-size: var(--text-xs); padding: 1px 5px; border-radius: 3px; background: #2a1a1a; color: var(--red); cursor: help; }
  .gate-pill-help { font-size: var(--text-xs); padding: 1px 5px; border-radius: 3px; background: #2a1a1a; color: var(--red); cursor: help; position: relative; }
  .gate-pill-help .gate-help-tip { display: none; position: absolute; bottom: calc(100% + 5px); left: 0; background: #2a2d3a; border: 1px solid var(--border); border-radius: 5px; padding: 7px 9px; font-size: var(--text-xs); color: var(--text); z-index: 60; white-space: normal; min-width: 220px; max-width: 300px; box-shadow: 0 4px 14px rgba(0,0,0,0.5); line-height: 1.4; pointer-events: none; }
  .gate-pill-help:hover .gate-help-tip { display: block; }

  .features { font-size: var(--text-xs); color: var(--muted); margin-top: 4px; }

  /* Card footer */
  .card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 6px; font-size: var(--text-xs); color: var(--muted); }

  /* Badges */
  .badge { display: inline-block; padding: 1px 5px; border-radius: 3px; font-size: var(--text-xs); font-weight: 600; text-transform: uppercase; margin-left: 4px; }
  .badge.new { background: #1a3a2a; color: var(--green); cursor: pointer; -webkit-user-select: none; user-select: none; }
  .badge.new:hover { opacity: 0.7; }
  .badge.new.dismissed { display: none; }
  .badge.reduced { background: #3a2a1a; color: var(--amber); }
  .price-history { font-size: var(--text-xs); color: var(--muted); margin-top: 2px; }
  .price-history .reduction { color: var(--green); font-weight: 600; }
  .badge.stale { background: #2a1a1a; color: var(--red); }
  .badge.stretch-badge { background: #1a2a3a; color: var(--accent); }
  .badge.section-label { font-size: var(--text-xs); padding: 1px 4px; }
  .badge.section-qualifying { background: #1a3a2a; color: var(--green); }
  .badge.section-stretch { background: #1a2a3a; color: var(--accent); }
  .badge.section-negotiation { background: #1a2a3a; color: var(--accent); }
  .badge.section-near-miss { background: #3a2a1a; color: var(--amber); }
  .badge.section-needs-verify { background: #1e1b4b; color: #818cf8; }
  .badge.section-favourite { background: #3a2a0a; color: var(--fav); }

  /* Area table */
  .area-table { width: 100%; border-collapse: collapse; font-size: var(--text-sm); margin-top: 10px; }
