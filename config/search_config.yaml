# UK Property Search Tool — Configuration
# All financial values in GBP, all distances in minutes walk

user:
  annual_income: 42256
  monthly_take_home: 2650
  total_savings: 37500
  deposit: 37500
  emergency_fund_target: 5000  # minimum recommended emergency fund
  mortgage_rate: 4.5
  mortgage_term_years: 30
  name: "Liam Bond"
  email: ""
  phone: ""
  postcode: ""
  is_first_time_buyer: false  # Standard SDLT rates apply

budget:
  freehold:
    ideal_min: 170000
    ideal_max: 190000       # £1,093 all-in — comfortable AMBER
    responsible_max: 195000  # low-SC freeholds only
    absolute_max: 200000     # max listed price — realistic negotiation to £190k or below
  leasehold:
    ideal_min: 170000
    ideal_max: 175000       # sweet spot with typical SC
    responsible_max: 180000  # your leasehold ceiling
    absolute_max: 200000     # max listed leasehold to negotiate down from
    service_charge_cap_for_absolute_max: 800  # £200k only if SC < £800/yr

monthly_target:
  min: 795    # housing ≤30% of take-home — GREEN (comfortable)
  max: 889    # housing ceiling — £1,100 all-in after £211 bills — AMBER/qualifying max

all_in_monthly_max: 1100  # hard ceiling (housing + bills) — max advisable for single income

estimated_bills:
  # Verified UK 2025-26 figures for 1-bed flat in Kent
  energy_monthly: 110    # Ofgem cap £1,641/yr typical
  water_monthly: 40      # Southern Water avg
  insurance_monthly: 20  # Contents + buildings basic
  broadband_monthly: 28  # Standard fibre
  tv_licence_monthly: 13 # £159/yr
  total_monthly: 211

council_tax_estimates:
  # Approximate 2025-26 with 25% single person discount (varies by council area)
  # Kent councils typically band A-C range £1,100-£1,600/yr after discount
  A: { annual: 1123, monthly: 94 }
  B: { annual: 1310, monthly: 109 }
  C: { annual: 1497, monthly: 125 }
  D: { annual: 1683, monthly: 140 }
  E: { annual: 2056, monthly: 171 }
  F: { annual: 2430, monthly: 203 }
  G: { annual: 2803, monthly: 234 }
  H: { annual: 3363, monthly: 280 }

hard_gates:
  min_bedrooms: 1
  lease_minimum_years: 120
  sof_lease_minimum_years: 80  # Share of freehold: extension is cheap (~£1k), no marriage value penalty
  service_charge_max_pa: 1800   # realistic for TW area — £1,500-1,800 common in managed blocks
  service_charge_ideal_pa: 1200  # preferred cap — above this check what's included
  ground_rent_max_pa: 350       # lenient — but auto-reject any escalation/doubling clauses
  ground_rent_ideal_pa: 200     # preferred — flag above this
  council_tax_max_band: "C"
  epc_minimum_rating: "C"
  station_max_walk_min: 25
  supermarket_max_walk_min: 30
  supermarket_preferred_walk_min: 30
  flood_zone_reject: 3  # Reject Zone 3, flag Zone 2

crime_thresholds:
  asb_monthly_max: 10
  burglary_monthly_max: 3
  drugs_monthly_max: 3
  violent_monthly_max: 8

scoring:
  financial_fit: 30
  crime_safety: 25
  cost_predictability: 15
  layout_livability: 15
  walkability: 10
  long_term_flexibility: 5

stretch:
  max_over_budget_pct: 15
  min_days_on_market: 60

stale:
  min_days_on_market: 30

max_radius_miles: 10  # Skip DB properties further than this from any configured search area

